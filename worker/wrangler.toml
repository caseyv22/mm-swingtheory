name = "mm-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── Default (Dev) ────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "mm-db"
database_id = "78b84a46-b53d-497e-abbd-1bfcdb2131ed"

[triggers]
crons = [
  "0 15 * * SUN",
  "0 15 * * *"
]

# ─── Production ───────────────────────────────────────────────────────────────
[env.production]
name = "mm-api-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "mm-db-prod"
database_id = "744079c7-bc14-4125-a530-9319c7bc4da3"

[env.production.triggers]
crons = [
  "0 15 * * SUN",
  "0 15 * * *"
]
