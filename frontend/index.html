<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover lets us use env(safe-area-inset-*) for iPhone notch/home-indicator
         interactive-widget=resizes-content asks Chrome/Edge to shrink the layout viewport
         when the keyboard opens, so visualViewport detection in useKeyboardOpen stays reliable -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Sync | Swing Theory</title>

    <!-- PWA -->
    <link rel="icon" type="image/png" href="/ST_App_Icon.png" />
    <link rel="apple-touch-icon" href="/ST_App_Icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#064029" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Swing Sync" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
